<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon" />
    <link rel="stylesheet" href="style/style.css" />

    <title>Order Summary - Component</title>
  </head>

  <body>
    <main>
      <section>
        <picture>
          <img
            src="assets/illustration-hero.svg"
            alt="Illustration of a Woman Listening to Music"
          />
        </picture>

        <article class="text-container">
          <h1>Order Summary</h1>

          <p class="app-description">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>

          <div class="box-plan">
            <img src="assets/icon-music.svg" alt="Music Icon" />

            <div class="box-plan-details">
              <p class="plan-type">Annual Plan</p>

              <p class="plan-price">$59.99/year</p>
            </div>

            <a href="#" class="btn-change">Change</a>
          </div>

          <a href="#" class="btn-pay">Proceed to Payment</a>

          <a href="#" class="btn-cancel">Cancel Order</a>
        </article>
      </section>
    </main>
  </body>
</html>

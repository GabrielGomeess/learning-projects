<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon" />
    <link rel="stylesheet" href="style/style.css" />

    <title>NFT Preview Card</title>
  </head>

  <body>
    <main>
      <section>
        <figure>
          <img
            class="ethereum-img"
            src="assets/image-equilibrium.jpg"
            alt="Holographic Cube Image"
          />
        </figure>

        <h1>Equilibrium #3429</h1>

        <p class="description">
          Our Equilibrium collection promotes balance and calm.
        </p>

        <div class="box-info">
          <div class="box-info-ethereum value-ethereum">
            <img src="assets/icon-ethereum.svg" alt="Ethereum Icon" />

            <p>0.041 ETH</p>
          </div>

          <div class="box-info-ethereum">
            <img src="assets/icon-clock.svg" alt="Clock Icon" />

            <p>3 days left</p>
          </div>
        </div>

        <hr />

        <div class="box-profile">
          <img
            class="profile-img"
            src="assets/image-avatar.png"
            alt="Profile Image"
          />

          <p>Creation of <a href="#">Jules Wyvern</a></p>
        </div>
      </section>
    </main>
  </body>
</html>
